# Build a real Windows kernel driver with pure-LLVM tooling.  The custom
# target spec (`x86_64-pc-windows-driver.json`) carries every kernel-mode
# link flag (`/SUBSYSTEM:NATIVE /DRIVER /ENTRY:DriverEntry`, ...) plus
# `disable-redzone = true` and `panic-strategy = abort`.  No precompiled
# libstd is pulled in because the target is custom: `build-std` rebuilds
# `core` and `compiler_builtins` from source.
#
# Output is a `.sys` directly -- rename or copy not needed.

[unstable]
build-std = ["core", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]

[build]
target = "x86_64-pc-windows-driver.json"

[target."x86_64-pc-windows-driver.json"]
linker = "rust-lld"
